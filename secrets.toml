# .streamlit/secrets.toml — the analyst credential for the Hospital Dashboard.
#
# IMPORTANT:
#  • On Streamlit Community Cloud, do NOT commit real secrets to your repo.
#    Instead paste these lines into:  App  →  Settings  →  Secrets.
#  • Locally, you can keep this file (it is git-ignored by .gitignore).
#
# Preferred: a salted PBKDF2 hash (plaintext is never stored).
# Generate your own with:   python make_hash.py "your-strong-password"
# The example below is for the password "ChangeThisPassword!" — REPLACE IT.

HOSPITAL_ADMIN_PASSWORD_HASH = "pbkdf2_sha256$200000$f185db318c2d7f6d8c92c0ec96033a06$2c0bf443023f93ebec5eb5df912fcbc81902b7031d2ef11b2ea2140e00751afb"

# Simpler but less secure alternative (use ONE of the two, not both):
# HOSPITAL_ADMIN_PASSWORD = "your-strong-password"

# Optional: two-factor authentication (a 6-digit code is then required at login).
# Generate one in the app: Data Entry → ⚙️ Settings → "Generate 2FA secret".
# HOSPITAL_ADMIN_TOTP_SECRET = "BASE32SECRET..."

# Optional: where the SQLite database file lives.
# HOSPITAL_DB_PATH = "hospital_dashboard.db"
